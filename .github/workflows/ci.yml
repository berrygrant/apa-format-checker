name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build frontend
        run: npm run build

      - name: Smoke test review stream (rule-based only)
        run: |
          node server/src/index.js &
          SERVER_PID=$!
          for attempt in $(seq 1 30); do
            if curl -sf http://127.0.0.1:3001/api/health > /dev/null; then
              break
            fi
            sleep 1
          done
          node scripts/smoke-review-stream.mjs http://127.0.0.1:3001
          kill "$SERVER_PID"
