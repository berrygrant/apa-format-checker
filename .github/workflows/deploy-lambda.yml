name: Deploy to Lambda

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  AWS_ROLE_TO_ASSUME: ${{ vars.AWS_ROLE_TO_ASSUME }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
  LAMBDA_FUNCTION_NAME: ${{ vars.LAMBDA_FUNCTION_NAME || 'thesis-apa-formatter' }}
  LAMBDA_STACK_NAME: ${{ vars.LAMBDA_STACK_NAME || 'thesis-apa-formatter-lambda' }}
  LAMBDA_SECRET_ID: ${{ vars.LAMBDA_SECRET_ID || 'prod/apa-format-checker' }}
  CUSTOM_DOMAIN_NAME: ${{ vars.CUSTOM_DOMAIN_NAME || 'apa.lingviz.com' }}
  CLOUDFRONT_CERTIFICATE_ARN: ${{ vars.CLOUDFRONT_CERTIFICATE_ARN || 'arn:aws:acm:us-east-1:723173543836:certificate/b1255947-4f28-4378-9017-7631ef894f2b' }}
  ROUTE53_HOSTED_ZONE_ID: ${{ vars.ROUTE53_HOSTED_ZONE_ID || 'Z06039273CWG1NUO8MR2K' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    concurrency: production-deploy

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate required environment variables
        run: |
          test -n "${{ env.AWS_REGION }}"
          test -n "${{ env.AWS_ROLE_TO_ASSUME }}"
          test -n "${{ env.ECR_REPOSITORY }}"
          test -n "${{ env.LAMBDA_FUNCTION_NAME }}"
          test -n "${{ env.LAMBDA_STACK_NAME }}"
          test -n "${{ env.LAMBDA_SECRET_ID }}"
          test -n "${{ env.CUSTOM_DOMAIN_NAME }}"
          test -n "${{ env.CLOUDFRONT_CERTIFICATE_ARN }}"
          test -n "${{ env.ROUTE53_HOSTED_ZONE_ID }}"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Lambda image
        id: build-image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          provenance: false
          sbom: false
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy Lambda stack
        run: |
          aws cloudformation deploy \
            --region "${AWS_REGION}" \
            --stack-name "${LAMBDA_STACK_NAME}" \
            --template-file infra/aws/lambda/template.yml \
            --capabilities CAPABILITY_NAMED_IAM \
            --parameter-overrides \
              FunctionName="${LAMBDA_FUNCTION_NAME}" \
              ImageUri="${{ steps.login-ecr.outputs.registry }}/${ECR_REPOSITORY}:${{ github.sha }}" \
              SecretId="${LAMBDA_SECRET_ID}" \
              DomainName="${CUSTOM_DOMAIN_NAME}" \
              CertificateArn="${CLOUDFRONT_CERTIFICATE_ARN}"

      - name: Wait for Lambda update
        run: aws lambda wait function-updated --region "${AWS_REGION}" --function-name "${LAMBDA_FUNCTION_NAME}"

      - name: Point custom domain at CloudFront
        run: |
          DISTRIBUTION_DOMAIN_NAME="$(aws cloudformation describe-stacks \
            --region "${AWS_REGION}" \
            --stack-name "${LAMBDA_STACK_NAME}" \
            --query "Stacks[0].Outputs[?OutputKey=='DistributionDomainName'].OutputValue" \
            --output text)"

          cat > /tmp/route53-change.json <<JSON
          {
            "Comment": "Point ${CUSTOM_DOMAIN_NAME} at the Thesis APA Formatter Lambda CloudFront distribution",
            "Changes": [
              {
                "Action": "UPSERT",
                "ResourceRecordSet": {
                  "Name": "${CUSTOM_DOMAIN_NAME}",
                  "Type": "A",
                  "AliasTarget": {
                    "HostedZoneId": "Z2FDTNDATAQYW2",
                    "DNSName": "${DISTRIBUTION_DOMAIN_NAME}",
                    "EvaluateTargetHealth": false
                  }
                }
              },
              {
                "Action": "UPSERT",
                "ResourceRecordSet": {
                  "Name": "${CUSTOM_DOMAIN_NAME}",
                  "Type": "AAAA",
                  "AliasTarget": {
                    "HostedZoneId": "Z2FDTNDATAQYW2",
                    "DNSName": "${DISTRIBUTION_DOMAIN_NAME}",
                    "EvaluateTargetHealth": false
                  }
                }
              }
            ]
          }
          JSON

          aws route53 change-resource-record-sets \
            --hosted-zone-id "${ROUTE53_HOSTED_ZONE_ID}" \
            --change-batch file:///tmp/route53-change.json

      - name: Show deployment URLs
        run: |
          aws cloudformation describe-stacks \
            --region "${AWS_REGION}" \
            --stack-name "${LAMBDA_STACK_NAME}" \
            --query "Stacks[0].Outputs[?OutputKey=='FunctionUrl' || OutputKey=='CustomDomainUrl'].OutputValue" \
            --output text
